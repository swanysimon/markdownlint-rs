fail_fast = true

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "check-yaml"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "tombi-check"
name = "check toml"
entry = "tombi check"
language = "system"
pass_filenames = false
types = ["toml"]
priority = 1

[[repos.hooks]]
id = "tombi-fmt"
name = "format toml"
entry = "tombi format"
language = "system"
pass_filenames = false
types = ["toml"]
priority = 2

[[repos.hooks]]
id = "clippy"
name = "clippy"
entry = "cargo clippy --fix --allow-dirty --all-targets --all-features -- -D warnings"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 2

[[repos.hooks]]
id = "rustfmt"
name = "format rust"
entry = "cargo fmt -- --files-with-diff"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 3

[[repos.hooks]]
id = "test"
name = "test rust"
entry = "cargo test"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 4

[[repos.hooks]]
id = "mdlint-check"
name = "check markdown rules (dogfood)"
entry = "cargo run -- check --exclude FORMAT_SPEC.md --exclude tests/fixtures"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 4

[[repos.hooks]]
id = "mdlint-format"
name = "check markdown formatting (dogfood)"
entry = "cargo run -- format --check --exclude FORMAT_SPEC.md --exclude tests/fixtures"
language = "system"
pass_filenames = false
types = ["rust"]
priority = 4

[[repos.hooks]]
id = "hadolint"
name = "check dockerfile"
entry = "hadolint"
language = "system"
files = "^Dockerfile$"
priority = 1

[[repos.hooks]]
id = "actionlint"
name = "check github workflows"
entry = "actionlint"
language = "system"
pass_filenames = false
files = "^.github/"
priority = 2
