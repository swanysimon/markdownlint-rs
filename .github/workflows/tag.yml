name: Tag and Release

on:
  push:
    tags:
      - 'v*.*.*'

# Prevent concurrent builds: only one at a time (main pushes + releases)
concurrency:
  group: main-build
  cancel-in-progress: false

jobs:
  lint:
    name: Lint and test
    uses: ./.github/workflows/lint.yml

  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get tag version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" | tee -a "$GITHUB_OUTPUT"

      - name: Compare tag and Cargo versions
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CARGO_VERSION="$(yq -roy '.package.version' Cargo.toml)"
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "Tag version ${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}" >&2
            exit 1
          fi

      - name: Check if release already exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view '${{ github.ref_name }}' --repo '${{ github.repository }}'; then
            echo "Release ${{ github.ref_name }} already exists" >&2
            exit 1
          fi

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # shellcheck disable=SC2016
          envsubst '$VERSION $REPO' < .github/release-template.md > /tmp/release-notes.md
          gh release create '${{ github.ref_name }}' \
            --repo '${{ github.repository }}' \
            --title "Release ${{ github.ref_name }}" \
            --draft \
            --notes-file /tmp/release-notes.md

  build:
    name: Build
    needs: draft-release
    permissions:
      contents: write
    uses: ./.github/workflows/build-binaries.yml
    with:
      release: ${{ github.ref_name }}

  publish-container:
    needs: draft-release
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-container.yml
    with:
      version: ${{ github.ref_name }}

  publish-crates-io:
    needs: draft-release
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-crates-io.yml

  publish-python:
    needs: build
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-python.yml
    with:
      release: ${{ github.ref_name }}

  publish-npm:
    needs: build
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      release: ${{ github.ref_name }}

  publish-release:
    name: Publish Release
    needs:
      - publish-container
      - publish-npm
      - publish-python
      - publish-crates-io
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit '${{ github.ref_name }}' --repo '${{ github.repository }}' --draft=false
